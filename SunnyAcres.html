//  EVENT SYSTEM
// =============================================================
const EVENT_TYPES = ['crows','merchant','lucky','rain_blessing','market_rush'];
function tryTriggerEvent(dt) {
  if (state.event) return;
  state.eventCooldown -= dt;
  if (state.eventCooldown > 0) return;
  // Higher chance on new day or every ~2 minutes
  if (Math.random() < 0.0008 * dt * 60 + 0.002) {
    triggerEvent(choice(EVENT_TYPES));
    state.eventCooldown = 90 + rand(120); // cooldown until next
  }
}
function triggerEvent(kind) {
  const banner = document.getElementById('event-banner');
  let msg = '', duration = 60;
  switch (kind) {
    case 'crows':
      msg = '🐦 Crows are attacking! Click them to scare them away!';
      duration = 30;
      spawnCrows(3 + randi(3));
      break;
    case 'merchant':
      msg = '🚐 Traveling merchant has arrived! Click News for special deals.';
      duration = 90;
      break;
    case 'lucky':
      msg = '🍀 Lucky Day! Crop yields are doubled for the next 60 seconds!';
      duration = 60;
      break;
    case 'rain_blessing':
      msg = '🌧️ Sudden rain! Crops growing faster for a minute.';
      duration = 60;
      state.weather = 'rainy';
      updateWeatherAndSeason();
      break;
    case 'market_rush':
      msg = '💰 Market rush! Sell prices boosted 50% for 60 seconds!';
      duration = 60;
      break;
  }
  state.event = { kind, until: nowSeconds() + duration, msg };
  if (banner) {
    banner.textContent = msg;
    banner.classList.add('show');
    banner.onclick = () => {
      if (kind === 'merchant') openNews();
      else if (kind === 'crows') sfx.click(); // just info
    };
  }
  sfx.bell();
}
function updateEvent(dt) {
  if (!state.event) return;
  if (nowSeconds() >= state.event.until) {
    if (state.event.kind === 'crows') {
      // remove remaining crows
      state.crows.length = 0;
    }
    state.event = null;
    const banner = document.getElementById('event-banner');
    if (banner) { banner.classList.remove('show'); banner.onclick = null; }
  }
}
function isEvent(kind) { return state.event && state.event.kind === kind; }

// =============================================================
//  CROW SYSTEM (defends crops)
// =============================================================
function spawnCrows(count) {
  // Find mature/growing crop tiles
  const targets = [];
  for (let y=0; y<GRID_H; y++) for (let x=0; x<GRID_W; x++) {
    if (state.grid[y][x].crop) targets.push({x, y});
  }
  if (targets.length === 0) {
    // no crops, just spawn in the world
    for (let i=0; i<count; i++) {
      state.crows.push(makeCrow(rand(GRID_W*TILE), rand(GRID_H*TILE)));
    }
    return;
  }
  for (let i=0; i<count; i++) {
    const t = choice(targets);
    const c = makeCrow(t.x*TILE + TILE/2, -40); // fly in from top
    c.tx = t.x*TILE + TILE/2;
    c.ty = t.y*TILE + TILE/2;
    c.targetTile = { x: t.x, y: t.y };
    state.crows.push(c);
  }
}
function makeCrow(x, y) {
  return {
    id: 'crow'+Date.now()+randi(1e6),
    x, y, tx: x, ty: y,
    targetTile: null,
    state: 'flying', // flying -> eating -> escaped
    t: 0, eatT: 0,
    frame: 0, frameT: rand(0.5),
    scared: false,
  };
}
function updateCrows(dt) {
  for (let i=state.crows.length-1; i>=0; i--) {
    const c = state.crows[i];
    c.frameT += dt;
    if (c.frameT > 0.2) { c.frame = 1 - c.frame; c.frameT = 0; }
    if (c.scared) {
      // fly away upward
      c.y -= 60*dt;
      c.x += c.dx || 0;
      if (c.y < -50) state.crows.splice(i, 1);
    } else if (c.state === 'flying') {
      const dx = c.tx - c.x, dy = c.ty - c.y;
      const d = Math.hypot(dx, dy);
      if (d > 4) {
        c.x += dx/d * 80 * dt;
        c.y += dy/d * 80 * dt;
      } else {
        c.state = 'eating';
        c.eatT = 0;
      }
    } else if (c.state === 'eating') {
      c.eatT += dt;
      if (c.eatT > 5 && c.targetTile) {
        // crow eats the crop!
        const tile = state.grid[c.targetTile.y][c.targetTile.x];
        if (tile.crop) {
          tile.crop = null; tile.plantedAt = 0; tile.type = 'soil';
          toast('A crow stole a crop!', 'error');
          floatText(c.x, c.y, 'Stolen!', '#d24a4a');
        }
        c.scared = true;
        c.dx = (Math.random()-0.5)*40;
      }
    }
  }
  // remove all when event is done
  if (!isEvent('crows') && state.crows.length > 0) {
    // make them fly away
    for (const c of state.crows) { c.scared = true; c.dx = (Math.random()-0.5)*40; }
  }
}
function shooCrow(crowId) {
  const c = state.crows.find(x => x.id === crowId);
  if (!c || c.scared) return;
  c.scared = true;
  c.dx = (Math.random()-0.5)*60;
  state.stats.crowsShooed++;
  spawnParticles(c.x, c.y, '#fff', 8);
  sfx.crow();
  floatText(c.x, c.y-10, '+5 ✦', '#3a8020');
  addXP(2);
  state.coins += 5;
  state.stats.earned += 5;
  updateHUD();
  checkAchievements();
}

// =============================================================
//  PET DOG SYSTEM (unlocked at lvl 4)
// =============================================================
function spawnDog() {
  state.dog = {
    x: GRID_W*TILE/2, y: GRID_H*TILE/2,
    tx: GRID_W*TILE/2, ty: GRID_H*TILE/2,
    state: 'idle', t: 0, frame: 0, frameT: 0,
    bonusTimer: 30 + rand(60),
  };
}
function updateDog(dt) {
  if (!state.dog) {
    if (state.level >= 4) spawnDog();
    return;
  }
  const d = state.dog;
  d.t += dt; d.frameT += dt;
  if (d.frameT > 0.25) { d.frame = 1 - d.frame; d.frameT = 0; }
  // wander
  const dx = d.tx - d.x, dy = d.ty - d.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 4) {
    const speed = 35;
    d.x += dx/dist * speed * dt;
    d.y += dy/dist * speed * dt;
  } else if (Math.random() < dt*0.4) {
    d.tx = rand(GRID_W*TILE);
    d.ty = rand(GRID_H*TILE);
  }
  // periodic bonus dig
  d.bonusTimer -= dt;
  if (d.bonusTimer <= 0) {
    d.bonusTimer = 60 + rand(120);
    // sparkle effect, give a small coin
    const coins = 5 + randi(15);
    state.coins += coins;
    state.stats.earned += coins;
    floatText(d.x, d.y-20, `Dog found +${coins}!`, '#3a8020');
    spawnParticles(d.x, d.y, '#ffe080', 14);
    sfx.bark();
    updateHUD();
  }
}

// =============================================================
//  FISHING MINIGAME
// =============================================================
function startFishing() {
  if (state.level < 3) { toast('Need level 3 to fish!', 'error'); sfx.error(); return; }
  // Pick a fish based on weighted by level
  const eligible = Object.entries(FISH).filter(([k,f]) => f.level <= state.level);
  const total = eligible.reduce((a,[k,f]) => a + f.weight, 0);
  let r = rand(total);
  let chosenKind = eligible[0][0];
  for (const [k,f] of eligible) { r -= f.weight; if (r <= 0) { chosenKind = k; break; } }
  // Zone size based on rarity
  const fish = FISH[chosenKind];
  const zoneWidth = 80 - fish.weight*0.3;
  const zoneStart = 60 + rand(120);
  state.fishing = {
    active: true,
    fishKind: chosenKind,
    pos: 0,
    dir: 1,
    speed: 180 + rand(120),
    zoneStart,
    zoneWidth: clamp(zoneWidth, 28, 80),
  };
  const overlay = document.getElementById('fishing-overlay');
  overlay.classList.add('open');
  const zone = document.getElementById('fishing-zone');
  zone.style.left = zoneStart + 'px';
  zone.style.width = state.fishing.zoneWidth + 'px';
  // Start marker animation
  requestAnimationFrame(animateFishingMarker);
}
function animateFishingMarker() {
  if (!state.fishing || !state.fishing.active) return;
  const f = state.fishing;
  const now = performance.now();
  f.pos += f.dir * f.speed * (1/60);
  if (f.pos > 280) { f.pos = 280; f.dir = -1; }
  if (f.pos < 0) { f.pos = 0; f.dir = 1; }
  const m = document.getElementById('fishing-marker');
  if (m) m.style.left = f.pos + 'px';
  requestAnimationFrame(animateFishingMarker);
}
function tryHookFish() {
  if (!state.fishing) return;
  const f = state.fishing;
  const inZone = f.pos >= f.zoneStart - 3 && f.pos <= f.zoneStart + f.zoneWidth + 3;
  const overlay = document.getElementById('fishing-overlay');
  overlay.classList.remove('open');
  f.active = false;
  if (inZone) {
    addItem(f.fishKind, 1);
    addXP(FISH[f.fishKind].xp);
    state.stats.fishCaught++;
    sfx.fishCatch();
    toast(`Caught a ${ITEMS[f.fishKind].name}!`, 'xp');
    questProgress('fish', f.fishKind, 1);
    checkAchievements();
  } else {
    toast('The fish got away!', 'error');
    sfx.splash();
  }
  state.fishing = null;
}
function cancelFishing() {
  state.fishing = null;
  document.getElementById('fishing-overlay').classList.remove('open');
}

// =============================================================
//  ORCHARD TREE SYSTEM
// =============================================================
function plantTree(type, gx, gy) {
  const def = ORCHARDS[type];
  if (state.level < def.level) { toast('Level too low!', 'error'); return false; }
  if (state.coins < def.seedCost) { toast('Not enough coins!', 'error'); sfx.cantAfford(); return false; }
  const t = state.grid[gy][gx];
  if (t.type !== 'plowed' && t.type !== 'soil') { toast('Must plant on soil!', 'error'); return false; }
  if (t.tree || t.building || t.crop) { toast('Tile occupied!', 'error'); return false; }
  state.coins -= def.seedCost;
  state.trees.push({
    id: 'tr'+Date.now()+randi(1e6),
    type, x: gx, y: gy,
    plantedAt: nowSeconds(),
    lastHarvested: 0,
  });
  state.grid[gy][gx].type = 'soil';
  state.grid[gy][gx].tree = true;
  sfx.plant();
  spawnParticles(gx*TILE+TILE/2, gy*TILE+TILE/2, '#3a8020', 12);
  updateHUD();
  return true;
}
function getTreeStage(tree) {
  const def = ORCHARDS[tree.type];
  const elapsed = nowSeconds() - tree.plantedAt;
  if (elapsed < def.grow * 0.4) return 0; // sapling
  if (elapsed < def.grow) return 1; // young
  if (tree.lastHarvested === 0 || (nowSeconds() - tree.lastHarvested) >= def.cycle) return 3; // mature with fruit
  return 2; // mature, no fruit
}
function tryHarvestTree(treeId) {
  const tree = state.trees.find(t => t.id === treeId);
  if (!tree) return;
  if (getTreeStage(tree) !== 3) return;
  const def = ORCHARDS[tree.type];
  const yieldAmt = def.yieldMin + randi(def.yieldMax - def.yieldMin + 1);
  const finalYield = isEvent('lucky') ? yieldAmt * 2 : yieldAmt;
  addItem(def.fruit, finalYield);
  addXP(def.xp);
  tree.lastHarvested = nowSeconds();
  if (state.stats.treesGrown < state.trees.length) state.stats.treesGrown = state.trees.length;
  sfx.harvest();
  spawnParticles(tree.x*TILE+TILE/2, tree.y*TILE+TILE/2-30, '#d83030', 14);
  floatText(tree.x*TILE+TILE/2, tree.y*TILE+TILE/2-30,
    `+${finalYield} ${ITEMS[def.fruit].name}`, '#3a8020');
  questProgress('harvest', def.fruit, finalYield);
  checkAchievements();
}

// =============================================================
//  ANIMAL FEEDING SYSTEM
// =============================================================
function penFeedLevel(buildingId) {
  return state.penFeed[buildingId] !== undefined ? state.penFeed[buildingId] : 100;
}
function feedPen(buildingId, amount) {
  const cur = penFeedLevel(buildingId);
  const have = state.inv.feed || 0;
  const toUse = Math.min(have, Math.max(0, Math.ceil((100 - cur) / 10)));
  if (toUse === 0) { toast('Pen is full!', ''); return; }
  removeItem('feed', toUse);
  state.penFeed[buildingId] = clamp(cur + toUse * 10, 0, 100);
  sfx.click();
  toast(`Used ${toUse} feed`, '');
  updateHUD();
}
function updatePenFeed(dt) {
  // Slowly deplete feed for each pen with animals
  for (const b of state.buildings) {
    const def = BUILDINGS[b.type];
    if (def.kind !== 'pen') continue;
    const animals = state.penAnimals[b.id] || [];
    if (animals.length === 0) continue;
    if (state.penFeed[b.id] === undefined) state.penFeed[b.id] = 100;
    state.penFeed[b.id] -= dt * animals.length * 0.18; // depletes
    state.penFeed[b.id] = clamp(state.penFeed[b.id], 0, 100);
  }
}

// =============================================================
//  CROP WITHERING SYSTEM (gentle)
// =============================================================
function isWithered(tile) {
  if (!tile.crop) return false;
  const crop = CROPS[tile.crop];
  const elapsed = nowSeconds() - tile.plantedAt;
  return elapsed >= crop.grow * 4; // 3x past mature
}
function isWilting(tile) {
  if (!tile.crop) return false;
  const crop = CROPS[tile.crop];
  const elapsed = nowSeconds() - tile.plantedAt;
  return elapsed >= crop.grow * 2.5 && elapsed < crop.grow * 4;
}



// =============================================================
//  GRID HELPERS
// =============================================================
function initGrid() {
  state.grid = [];
  for (let y=0; y<GRID_H; y++) {
    const row = [];
    for (let x=0; x<GRID_W; x++) {
      row.push({ type: 'grass', crop: null, plantedAt: 0, watered: false, building: null });
    }
    state.grid.push(row);
  }
}

// Mark tiles occupied by buildings
function markBuildingTiles() {
  // Reset
  for (let y=0; y<GRID_H; y++) for (let x=0; x<GRID_W; x++) {
    if (state.grid[y][x].building) state.grid[y][x].building = null;
  }
  for (const b of state.buildings) {
    const def = BUILDINGS[b.type];
    for (let dy=0; dy<def.h; dy++) {
      for (let dx=0; dx<def.w; dx++) {
        const x = b.x+dx, y = b.y+dy;
        if (x<0||y<0||x>=GRID_W||y>=GRID_H) continue;
        state.grid[y][x].building = b.id;
      }
    }
  }
}

function tileAt(wx, wy) {
  const gx = Math.floor(wx / TILE);
  const gy = Math.floor(wy / TILE);
  if (gx<0||gy<0||gx>=GRID_W||gy>=GRID_H) return null;
  return { gx, gy, t: state.grid[gy][gx] };
}

function buildingAt(gx, gy) {
  const t = state.grid[gy] && state.grid[gy][gx];
  if (!t || !t.building) return null;
  return state.buildings.find(b => b.id === t.building);
}

function canPlaceBuilding(type, gx, gy) {
  const def = BUILDINGS[type];
  for (let dy=0; dy<def.h; dy++) {
    for (let dx=0; dx<def.w; dx++) {
      const x = gx+dx, y = gy+dy;
      if (x<0||y<0||x>=GRID_W||y>=GRID_H) return false;
      const t = state.grid[y][x];
      if (t.building) return false;
      // Fishing dock needs water adjacency or can be placed on grass — allow grass for simplicity
      if (def.kind === 'fishing') {
        if (t.type !== 'grass' && t.type !== 'soil') return false;
      } else {
        if (t.type !== 'grass' && t.type !== 'plowed' && t.type !== 'soil') return false;
      }
      if (t.crop) return false;
      if (t.tree) return false;
      // No decor underneath either
      if (state.decor.some(d => {
        const dD = DECORATIONS[d.type];
        return x >= d.x && x < d.x+dD.w && y >= d.y && y < d.y+dD.h;
      })) return false;
    }
  }
  return true;
}

// =============================================================
//  CAMERA / INPUT
// =============================================================
let isDragging = false;
let dragStart = null;
let didDrag = false;
let mousePos = { x: 0, y: 0 };

function worldToScreen(wx, wy) {
  return { x: (wx - state.camX) * state.camScale + SW()/2,
           y: (wy - state.camY) * state.camScale + SH()/2 };
}
function screenToWorld(sx, sy) {
  return { x: (sx - SW()/2) / state.camScale + state.camX,
           y: (sy - SH()/2) / state.camScale + state.camY };
}

function clampCamera() {
  const margin = 240;
  state.camX = clamp(state.camX, -margin, GRID_W*TILE + margin);
  state.camY = clamp(state.camY, -margin, GRID_H*TILE + margin);
}

function attachInput() {
  cv.addEventListener('mousedown', onPointerDown);
  cv.addEventListener('mousemove', onPointerMove);
  cv.addEventListener('mouseup', onPointerUp);
  cv.addEventListener('mouseleave', onPointerUp);
  cv.addEventListener('wheel', onWheel, { passive: false });

  cv.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      onPointerDown({ clientX: t.clientX, clientY: t.clientY, button: 0, preventDefault: ()=>{} });
    }
    e.preventDefault();
  }, { passive: false });
  cv.addEventListener('touchmove', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      onPointerMove({ clientX: t.clientX, clientY: t.clientY });
    }
    e.preventDefault();
  }, { passive: false });
  cv.addEventListener('touchend', e => {
    onPointerUp({});
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('keydown', e => {
    if (e.key === '1') setTool('hand');
    else if (e.key === '2') setTool('plow');
    else if (e.key === '3') setTool('seed');
    else if (e.key === 'Escape') {
      if (state.placing) { state.placing = null; toast('Build cancelled'); return; }
      closeModal();
    }
  });
}

function onPointerDown(e) {
  ensureAudio();
  isDragging = true; didDrag = false;
  dragStart = { x: e.clientX, y: e.clientY, camX: state.camX, camY: state.camY };
  cv.classList.add('dragging');
}
function onPointerMove(e) {
  mousePos.x = e.clientX; mousePos.y = e.clientY;
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didDrag = true;
    if (didDrag) {
      state.camX = dragStart.camX - dx / state.camScale;
      state.camY = dragStart.camY - dy / state.camScale;
      clampCamera();
    }
  }
  updateHoverTooltip();
}
function onPointerUp(e) {
  cv.classList.remove('dragging');
  if (isDragging && !didDrag) {
    handleTap(mousePos.x, mousePos.y);
  }
  isDragging = false;
  dragStart = null;
}
function onWheel(e) {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.88 : 1.12;
  const before = screenToWorld(e.clientX, e.clientY);
  state.camScale = clamp(state.camScale * factor, 0.5, 2.4);
  const after = screenToWorld(e.clientX, e.clientY);
  state.camX += before.x - after.x;
  state.camY += before.y - after.y;
  clampCamera();
}

// =============================================================
//  ACTIONS
// =============================================================
function handleTap(sx, sy) {
  const w = screenToWorld(sx, sy);
  const t = tileAt(w.x, w.y);

  // Check crows first (highest priority — they may be flying anywhere)
  for (const c of state.crows) {
    if (c.scared) continue;
    const dx = c.x - w.x, dy = c.y - w.y;
    if (dx*dx + dy*dy < 800) { // ~28px radius
      shooCrow(c.id);
      return;
    }
  }

  if (!t) return;

  // Decoration placement
  if (state.placing && state.placing.decor) {
    tryPlaceDecoration(t.gx, t.gy);
    return;
  }
  // Tree planting
  if (state.placing && state.placing.tree) {
    if (plantTree(state.placing.tree, t.gx, t.gy)) state.placing = null;
    return;
  }
  // Regular building placement
  if (state.placing) {
    tryPlaceBuilding(t.gx, t.gy);
    return;
  }

  // Click on a tree → harvest if ready
  const tree = state.trees.find(tr => tr.x === t.gx && tr.y === t.gy);
  if (tree) {
    tryHarvestTree(tree.id);
    return;
  }

  // If clicked on a building, open it
  if (t.t.building) {
    const b = buildingAt(t.gx, t.gy);
    if (b) {
      openBuildingPanel(b);
      return;
    }
  }

  // Tool actions
  if (state.selectedTool === 'plow') {
    tryPlow(t.gx, t.gy);
  } else if (state.selectedTool === 'seed') {
    tryPlant(t.gx, t.gy);
  } else {
    // hand: harvest if ready or interact
    tryHarvestOrInteract(t.gx, t.gy);
  }
}

// Place a decoration on a grass tile
function tryPlaceDecoration(gx, gy) {
  const type = state.placing.type;
  const def = DECORATIONS[type];
  // Check all required tiles are grass
  for (let dy=0; dy<def.h; dy++) {
    for (let dx=0; dx<def.w; dx++) {
      const x = gx+dx, y = gy+dy;
      if (x<0||x>=GRID_W||y<0||y>=GRID_H) { toast('Out of bounds', 'error'); sfx.error(); return; }
      const tile = state.grid[y][x];
      if (tile.type !== 'grass' || tile.crop || tile.building || tile.tree) {
        toast('Need clear grass', 'error'); sfx.error(); return;
      }
      if (state.decor.some(d => d.x === x && d.y === y)) {
        toast('Already decorated here', 'error'); sfx.error(); return;
      }
    }
  }
  if (state.coins < def.price) { toast('Not enough coins!', 'error'); sfx.cantAfford(); return; }
  state.coins -= def.price;
  state.decor.push({
    id: 'd'+Date.now()+randi(1e6),
    type, x: gx, y: gy,
  });
  state.stats.decorsPlaced = (state.stats.decorsPlaced||0) + 1;
  state.placing = null;
  sfx.build();
  spawnParticles(gx*TILE+TILE/2, gy*TILE+TILE/2, '#ff80c0', 16);
  toast(`Placed ${def.name}!`, 'xp');
  updateHUD();
  checkAchievements();
}

function tryPlow(gx, gy) {
  const t = state.grid[gy][gx];
  if (t.building || t.crop || t.tree) { sfx.error(); return; }
  if (t.type === 'plowed') {
    // unplow
    t.type = 'grass';
    sfx.plow();
    spawnParticles(gx*TILE+TILE/2, gy*TILE+TILE/2, '#6e4520', 6);
    return;
  }
  if (t.type === 'grass' || t.type === 'soil') {
    t.type = 'plowed';
    state.stats.plowed = (state.stats.plowed||0) + 1;
    sfx.plow();
    spawnParticles(gx*TILE+TILE/2, gy*TILE+TILE/2, '#8b5a2b', 10);
    checkAchievements();
  }
}

function tryPlant(gx, gy) {
  const t = state.grid[gy][gx];
  if (t.type !== 'plowed' || t.crop || t.building) { sfx.error(); return; }
  const cropKey = state.selectedSeed;
  const crop = CROPS[cropKey];
  if (state.level < crop.level) { toast(`Need level ${crop.level}`, 'error'); sfx.error(); return; }
  if (state.coins < crop.seedCost) { toast('Not enough coins for seed', 'error'); sfx.cantAfford(); return; }
  state.coins -= crop.seedCost;
  t.crop = cropKey;
  t.plantedAt = nowSeconds();
  state.stats.planted++;
  sfx.plant();
  spawnParticles(gx*TILE+TILE/2, gy*TILE+TILE/2, '#7ec850', 8);
  floatText(gx*TILE+TILE/2, gy*TILE+TILE/2-12, `-${crop.seedCost}`, '#c44040');
  updateHUD();
}

function tryHarvestOrInteract(gx, gy) {
  const t = state.grid[gy][gx];
  if (t.crop && cropStage(t) === 3) {
    const crop = CROPS[t.crop];
    // Withered crops give nothing
    if (isWithered(t)) {
      t.crop = null; t.plantedAt = 0; t.type = 'soil';
      toast('Crop withered!', 'error');
      floatText(gx*TILE+TILE/2, gy*TILE+TILE/2-12, 'Withered!', '#9a4040');
      sfx.error();
      return;
    }
    let yieldAmt = randi(crop.yieldMax - crop.yieldMin + 1) + crop.yieldMin;
    // Lucky day event doubles yield
    if (isEvent('lucky')) yieldAmt *= 2;
    addItem(crop.item, yieldAmt);
    addXP(crop.xp);
    state.stats.harvested += yieldAmt;
    sfx.harvest();
    spawnParticles(gx*TILE+TILE/2, gy*TILE+TILE/2, '#ffe080', 14);
    floatText(gx*TILE+TILE/2, gy*TILE+TILE/2-12,
      `+${yieldAmt} ${ITEMS[crop.item].name}`, '#3a8020');
    t.crop = null; t.plantedAt = 0; t.type = 'soil';
    questProgress('harvest', crop.item, yieldAmt);
    checkAchievements();
  }
}

function cropStage(tile) {
  if (!tile.crop) return -1;
  const crop = CROPS[tile.crop];
  // Apply weather/season growth multiplier
  const elapsed = (nowSeconds() - tile.plantedAt) * growthMultiplier();
  const p = elapsed / crop.grow;
  if (p >= 1.0) return 3;
  if (p >= 0.66) return 2;
  if (p >= 0.33) return 1;
  return 0;
}

function nowSeconds() { return performance.now() / 1000; }

// =============================================================
//  INVENTORY / XP
// =============================================================
function addItem(key, qty) {
  state.inv[key] = (state.inv[key]||0) + qty;
}
function removeItem(key, qty) {
  if ((state.inv[key]||0) < qty) return false;
  state.inv[key] -= qty;
  if (state.inv[key] <= 0) delete state.inv[key];
  return true;
}
function hasItems(reqs) {
  for (const k in reqs) if ((state.inv[k]||0) < reqs[k]) return false;
  return true;
}

function addXP(amt) {
  state.xp += amt;
  let leveled = false;
  while (state.xp >= xpForLevel(state.level)) {
    state.xp -= xpForLevel(state.level);
    state.level++;
    leveled = true;
    toast(`Level up! → ${state.level}`, 'xp');
    sfx.levelup();
    const reward = state.level * 20;
    state.coins += reward;
    state.stats.earned = (state.stats.earned||0) + reward;
    toast(`+${reward} coins reward`, 'gold');
    spawnParticles(SW()/2, SH()/2, '#ffd040', 40, true);
    maybeUnlockOrders();
    // Spawn dog at level 4
    if (state.level === 4 && !state.dog) spawnDog();
  }
  toastXP(`+${amt} XP`);
  updateHUD();
  if (leveled) {
    checkSelectedSeedValid();
    checkAchievements();
  }
}

function checkSelectedSeedValid() {
  if (CROPS[state.selectedSeed].level > state.level) {
    state.selectedSeed = 'wheat';
    updateSeedBtnLabel();
  }
}

function toast(msg, kind='') {
  const el = document.createElement('div');
  el.className = 'toast ' + (kind === 'gold' ? 'gold' : (kind === 'xp' ? 'xp' : ''));
  if (kind === 'gold') {
    el.innerHTML = `<img class="ico-mini" src="${sprites.item.coin.toDataURL()}">${msg}`;
  } else if (kind === 'xp') {
    el.innerHTML = `<img class="ico-mini" src="${sprites.item.xp.toDataURL()}">${msg}`;
  } else {
    el.textContent = msg;
  }
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 2800);
}
function toastXP(msg) { toast(msg, 'xp'); }

// =============================================================
//  PARTICLES & FLOAT TEXT
// =============================================================
function spawnParticles(wx, wy, color, n, big=false) {
  for (let i=0; i<n; i++) {
    const ang = rand(Math.PI*2);
    const sp = (big ? 80 : 40) + rand(big?80:40);
    state.particles.push({
      x: wx, y: wy,
      vx: Math.cos(ang)*sp,
      vy: Math.sin(ang)*sp - (big?40:20),
      life: 0.6+rand(0.4),
      age: 0, color, size: big?4:3
    });
  }
}
function floatText(wx, wy, text, color) {
  state.floats.push({ x: wx, y: wy, text, color, age: 0, life: 1.2 });
}

function generateOrder() {
  const eligible = Object.keys(ITEMS).filter(k => ITEMS[k].level <= state.level);
  const count = 1 + (state.level>=4?1:0) + (state.level>=8?1:0);
  const items = {};
  let totalVal = 0;
  for (let i=0;i<count;i++) {
    const key = choice(eligible);
    const qty = 1 + randi(3);
    items[key] = (items[key]||0) + qty;
    totalVal += ITEMS[key].sell * qty;
  }
  const reward = Math.floor(totalVal * (1.4 + rand(0.5)));
  const xp = Math.max(1, Math.floor(totalVal/12));
  return { id: 'o'+Date.now()+randi(1e6), items, reward, xp };
}
function maybeUnlockOrders() {
  while (state.orders.length < Math.min(4, 2 + Math.floor(state.level/3))) {
    const o = generateOrder();
    state.orders.push(o);
  }
  renderOrders();
}
function fulfillOrder(orderId) {
  const idx = state.orders.findIndex(o => o.id === orderId);
  if (idx < 0) return;
  const o = state.orders[idx];
  if (!hasItems(o.items)) { sfx.error(); return; }
  for (const k in o.items) removeItem(k, o.items[k]);
  state.coins += o.reward;
  state.stats.earned = (state.stats.earned||0) + o.reward;
  state.stats.ordersFulfilled = (state.stats.ordersFulfilled||0) + 1;
  addXP(o.xp);
  sfx.order(); sfx.coin();
  toast(`Order fulfilled! +${o.reward}`, 'gold');
  state.orders.splice(idx, 1);
  // generate new one
  setTimeout(()=>{ state.orders.push(generateOrder()); renderOrders(); }, 600);
  renderOrders();
  updateHUD();
  questProgress('orders', null, 1);
  checkAchievements();
}

function renderOrders() {
  const list = document.getElementById('orders-list');
  list.innerHTML = '';
  if (state.orders.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#888;padding:8px;font-size:11px">No orders. Level up to attract customers!</div>';
    return;
  }
  for (const o of state.orders) {
    const card = document.createElement('div');
    card.className = 'order-card';
    const itemsHTML = Object.entries(o.items).map(([k,q]) => {
      const have = state.inv[k]||0;
      const ok = have >= q;
      return `<div class="order-item" style="${ok?'border-color:#6abf4b;background:#eaf5d0':''}">
        <img class="ico-mini" src="${sprites.item[k].toDataURL()}">
        <span>${q}× ${ITEMS[k].name}</span>
        <span style="opacity:0.6">(${have})</span>
      </div>`;
    }).join('');
    const can = hasItems(o.items);
    card.innerHTML = `
      <div>${itemsHTML}</div>
      <div class="order-items">
        <div class="order-reward">
          <img class="ico-mini" src="${sprites.item.coin.toDataURL()}">+${o.reward}
        </div>
        <div class="order-reward">
          <img class="ico-mini" src="${sprites.item.xp.toDataURL()}">+${o.xp}
        </div>
      </div>
      <button class="order-fulfill" ${can?'':'disabled'} data-id="${o.id}">
        ${can?'Deliver':'Need items'}
      </button>
    `;
    list.appendChild(card);
  }
  list.querySelectorAll('button[data-id]').forEach(btn =>
    btn.addEventListener('click', () => fulfillOrder(btn.dataset.id)));
}

function openModal(title, tabs, defaultTab) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-title').textContent = title;
  const tabsEl = document.getElementById('modal-tabs');
  tabsEl.innerHTML = '';
  if (tabs && tabs.length>1) {
    tabs.forEach(t => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (t.key === defaultTab ? ' active' : '');
      tab.textContent = t.label;
      tab.addEventListener('click', () => {
        tabsEl.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        tab.classList.add('active');
        t.render(document.getElementById('modal-body'));
      });
      tabsEl.appendChild(tab);
    });
  }
  const def = tabs ? tabs.find(t=>t.key===defaultTab) || tabs[0] : null;
  if (def) def.render(document.getElementById('modal-body'));
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal-close').addEventListener('click', closeModal);

  container.innerHTML = `<div class="shop-grid"></div>`;
  const grid = container.querySelector('.shop-grid');
  for (const k of keys) {
    const it = ITEMS[k];
    if (!it) continue;

    div.className = 'shop-item';
    div.innerHTML = `
      <img class="ico" src="${sprites.item[k].toDataURL()}">

    `;
    const [b1, ball] = div.querySelectorAll('button');
    b1.addEventListener('click', () => sellItem(k, 1));
    ball.addEventListener('click', () => sellItem(k, state.inv[k]));

function sellItem(k, qty) {
  if (!state.inv[k] || state.inv[k] < qty) return;
  const it = ITEMS[k];
  removeItem(k, qty);
  let unitPrice = it.sell;
  if (isEvent('market_rush')) unitPrice = Math.floor(unitPrice * 1.5);
  const total = unitPrice * qty;
  state.coins += total;
  state.stats.sold += qty;
  state.stats.earned = (state.stats.earned||0) + total;
  sfx.coin();
  toast(`+${total}${isEvent('market_rush')?' (+50%!)':''}`, 'gold');
  updateHUD();
  // Refresh sell tab if open
  renderShopSell(document.getElementById('modal-body'));
  questProgress('sell', k, qty);
  questProgress('earn', null, total);
  checkAchievements();
}

function buyShopItem(key, qty, unit) {
  const total = unit * qty;
  if (state.coins < total) { sfx.cantAfford(); toast('Not enough coins!', 'error'); return; }
  state.coins -= total;
  addItem(key, qty);
  sfx.coin();
  toast(`+${qty} ${ITEMS[key].name}`);
  updateHUD();
  renderShopFeed(document.getElementById('modal-body'));
}

function tryPlaceBuilding(gx, gy) {
  const { type } = state.placing;
  const def = BUILDINGS[type];
  if (!canPlaceBuilding(type, gx, gy)) {
    toast('Cannot place here', 'error'); sfx.error();
    return;
  }
  if (state.coins < def.price) {
    toast('Not enough coins', 'error'); sfx.cantAfford(); state.placing = null; return;
  }
  state.coins -= def.price;
  const id = 'b'+Date.now()+randi(1e6);
  state.buildings.push({ id, type, x: gx, y: gy, smokeT: 0 });
  // For pens, also clear any crops in the area (shouldn't be possible due to canPlaceBuilding) and convert tiles to dirt
  for (let dy=0; dy<def.h; dy++) for (let dx=0; dx<def.w; dx++) {
    state.grid[gy+dy][gx+dx].type = 'soil';
    state.grid[gy+dy][gx+dx].crop = null;
  }
  markBuildingTiles();
  if (def.kind === 'pen') state.penAnimals[id] = [];
  if (def.kind === 'production') state.prodQueues[id] = [];
  sfx.build();
  spawnParticles(gx*TILE + (def.w*TILE)/2, gy*TILE + (def.h*TILE)/2, '#a87248', 24);
  state.placing = null;
  updateHUD();
  toast(`Built ${def.name}!`);
}

// ---- Building panel ----
function openBuildingPanel(b) {
  const def = BUILDINGS[b.type];
  if (def.kind === 'pen') openPenPanel(b);
  else if (def.kind === 'production') openProductionPanel(b);
  else if (def.kind === 'fishing') startFishing();
}

function openPenPanel(b) {
  const def = BUILDINGS[b.type];
  const aniDef = ANIMALS[def.animal];
  const animals = state.penAnimals[b.id] || (state.penAnimals[b.id] = []);
  if (state.penFeed[b.id] === undefined) state.penFeed[b.id] = 100;

  openModal(`${def.name}`, null);
  document.getElementById('modal-tabs').innerHTML = '';
  const body = document.getElementById('modal-body');

  function render() {
    const feedPct = penFeedLevel(b.id);
    const isHungry = feedPct < 20;
    const slots = [];
    for (let i=0; i<def.capacity; i++) {
      const a = animals[i];
      if (a) {
        const elapsed = nowSeconds() - a.lastProduced;
        const ready = elapsed >= aniDef.produceTime;
        const pct = Math.min(100, elapsed / aniDef.produceTime * 100);
        slots.push(`
          <div class="shop-item">
            <img class="ico" src="${sprites.animal[def.animal][0].toDataURL()}">
            <div class="name">${aniDef.name}${isHungry?' 😟':''}</div>
            <div style="width:100%;height:8px;background:#efe2c0;border-radius:4px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${ready?'#6abf4b':'#7ac0ef'}"></div>
            </div>
            <button ${ready && !isHungry ?'':'disabled'} data-act="collect" data-idx="${i}">${
              isHungry ? 'Too hungry!' :
              ready ? 'Collect '+ITEMS[aniDef.produces].name :
              'Growing... '+Math.ceil(aniDef.produceTime - elapsed)+'s'
            }</button>
          </div>
        `);
      } else {
        slots.push(`
          <div class="shop-item">
            <div style="opacity:0.4;font-size:60px">+</div>
            <div class="name">Empty slot</div>
            <div class="price"><img class="ico-mini" src="${sprites.item.coin.toDataURL()}">${aniDef.price}</div>
            <button data-act="buy">Buy ${aniDef.name}</button>
          </div>
        `);
      }
    }
    body.innerHTML = `
      <div style="font-size:13px;margin-bottom:6px;color:#666">
        Animals produce ${ITEMS[aniDef.produces].name} every ${aniDef.produceTime}s.
        Capacity: ${animals.length}/${def.capacity}
      </div>
      <div style="background:#fff;border:2px solid var(--panel-edge);border-radius:8px;padding:8px;margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <img class="ico-mini" src="${sprites.item.feed.toDataURL()}">
        <div style="flex:1">
          <div style="font-size:12px;color:#5a3d0c;font-weight:bold">Feed: ${Math.floor(feedPct)}%</div>
          <div class="feed-bar"><div class="feed-bar-fill ${isHungry?'low':''}" style="width:${feedPct}%"></div></div>
        </div>
        <button data-act="feed" style="background:var(--green-btn);color:white;border:none;border-radius:6px;padding:6px 12px;font-weight:bold;cursor:pointer">Feed</button>
        <span style="font-size:11px;color:#888">have: ${state.inv.feed||0}</span>
      </div>
      ${isHungry ? '<div style="color:#d24a4a;font-size:12px;margin-bottom:6px;text-align:center">⚠️ Animals are too hungry to produce. Feed them!</div>' : ''}
      <div class="shop-grid">${slots.join('')}</div>
    `;
    body.querySelectorAll('button[data-act]').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.act;
        if (act === 'feed') {
          feedPen(b.id, 10);
          render();
        } else if (act === 'buy') {
          if (state.coins < aniDef.price) { sfx.cantAfford(); toast('Not enough coins!','error'); return; }
          if (animals.length >= def.capacity) return;
          state.coins -= aniDef.price;
          state.stats.animalsOwned = (state.stats.animalsOwned||0) + 1;
          animals.push({
            kind: def.animal,
            lastProduced: nowSeconds(),
            // ambient position within pen for drawing
            ax: rand(def.w*TILE - 40) + 20,
            ay: rand(def.h*TILE - 40) + 20,
            tx: rand(def.w*TILE - 40) + 20,
            ty: rand(def.h*TILE - 40) + 20,
            frameT: rand(2),
            frame: 0,
          });
          sfx.coin();
          toast(`Got a ${aniDef.name}!`);
          updateHUD();
          checkAchievements();
          render();
        } else if (act === 'collect') {
          const idx = parseInt(btn.dataset.idx);
          const a = animals[idx];
          const elapsed = nowSeconds() - a.lastProduced;
          if (elapsed < aniDef.produceTime) return;
          if (isHungry) { toast('Animals too hungry!','error'); return; }
          addItem(aniDef.produces, 1);
          addXP(aniDef.xp);
          state.stats.produced++;
          state.stats.itemsProduced = state.stats.itemsProduced || {};
          state.stats.itemsProduced[aniDef.produces] = (state.stats.itemsProduced[aniDef.produces]||0) + 1;
          a.lastProduced = nowSeconds();
          sfx.harvest();
          floatText(b.x*TILE + def.w*TILE/2, b.y*TILE + def.h*TILE/2,
            `+1 ${ITEMS[aniDef.produces].name}`, '#3a8020');
          questProgress('produce', aniDef.produces, 1);
          checkAchievements();
          render();
        }
      });
    });
  }
  render();
}

function openProductionPanel(b) {
  const def = BUILDINGS[b.type];
  const queue = state.prodQueues[b.id] || (state.prodQueues[b.id] = []);
  const maxQueue = 4;
  openModal(`${def.name}`, null);
  document.getElementById('modal-tabs').innerHTML = '';
  const body = document.getElementById('modal-body');

  function render() {
    const recipesHTML = def.recipes.map((r, idx) => {
      const ok = state.level >= (r.lvl||0) && hasItems(r.in) && queue.length < maxQueue;
      const inHTML = Object.entries(r.in).map(([k,q])=>{
        const have = state.inv[k]||0;
        const meet = have >= q;
        return `<img class="ico" src="${sprites.item[k].toDataURL()}" style="${meet?'':'filter:grayscale(80%)'}">×${q}<small style="opacity:0.6">(${have})</small>`;
      }).join('');
      const outHTML = Object.entries(r.out).map(([k,q])=>`<img class="ico" src="${sprites.item[k].toDataURL()}">×${q}`).join('');
      return `
        <div class="recipe">
          <div class="in">${inHTML}</div>
          <div class="arrow">→</div>
          <div class="out">${outHTML}</div>
          <div class="recipe-info">
            <div class="name">${Object.keys(r.out).map(k=>ITEMS[k].name).join(', ')}</div>
            <div class="time">${r.time}s · +${r.xp} XP</div>
          </div>
          <button ${ok?'':'disabled'} data-idx="${idx}">Produce</button>
        </div>
      `;
    }).join('');

    let queueHTML = '<div class="queue">';
    for (let i=0; i<maxQueue; i++) {
      const job = queue[i];
      if (job) {
        const left = Math.max(0, job.doneAt - nowSeconds());
        const ready = left <= 0;
        const out = Object.keys(def.recipes[job.recipeIdx].out)[0];
        queueHTML += `<div class="queue-slot">
          <img class="ico" src="${sprites.item[out].toDataURL()}">
          ${ready?'<div class="ready-mark">✓</div>':`<div class="timer">${Math.ceil(left)}s</div>`}
        </div>`;
      } else {
        queueHTML += '<div class="queue-slot empty"></div>';
      }
    }
    queueHTML += '</div>';

    body.innerHTML = `
      <div class="recipe-list">${recipesHTML}</div>
      <div style="margin-top:10px;font-size:13px"><b>Queue (${queue.length}/${maxQueue}):</b></div>
      ${queueHTML}
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn primary" id="collect-ready">Collect Ready</button>
      </div>
    `;
    body.querySelectorAll('.recipe button[data-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const r = def.recipes[idx];
        if (queue.length >= maxQueue) { toast('Queue full!', 'error'); sfx.error(); return; }
        if (!hasItems(r.in)) { sfx.error(); return; }
        for (const k in r.in) removeItem(k, r.in[k]);
        queue.push({ recipeIdx: idx, startTime: nowSeconds(), doneAt: nowSeconds()+r.time });
        sfx.click();
        render();
      });
    });
    document.getElementById('collect-ready').addEventListener('click', () => {
      let collected = 0;
      while (queue.length>0 && queue[0].doneAt <= nowSeconds()) {
        const job = queue.shift();
        const r = def.recipes[job.recipeIdx];
        for (const k in r.out) {
          addItem(k, r.out[k]);
          state.stats.itemsProduced = state.stats.itemsProduced || {};
          state.stats.itemsProduced[k] = (state.stats.itemsProduced[k]||0) + r.out[k];
          questProgress('produce', k, r.out[k]);
        }
        addXP(r.xp);
        state.stats.produced++;
        collected++;
      }
      if (collected>0) {
        sfx.harvest();
        toast(`Collected ${collected} item${collected>1?'s':''}`);
        checkAchievements();
      } else {
        sfx.error();
      }
      render();
    });
  }
  render();
  // Live-update timers
  const interval = setInterval(() => {
    if (!document.getElementById('modal').classList.contains('open')) {
      clearInterval(interval); return;
    }
    if (!body.querySelector('.queue')) { clearInterval(interval); return; }
    render();
  }, 1000);
}

const tooltip = document.getElementById('tooltip');
function updateHoverTooltip() {
  if (isDragging) { tooltip.style.display='none'; return; }
  const w = screenToWorld(mousePos.x, mousePos.y);
  const t = tileAt(w.x, w.y);
  if (!t) { tooltip.style.display='none'; return; }
  let text = '';
  if (t.t.building) {
    const b = buildingAt(t.gx, t.gy);
    text = BUILDINGS[b.type].name + ' (tap to open)';
  } else if (t.t.crop) {
    const stage = cropStage(t.t);
    const crop = CROPS[t.t.crop];
    if (stage === 3) text = `${ITEMS[crop.item].name} ready! Tap to harvest`;
    else {
      const left = Math.max(0, Math.ceil(crop.grow - (nowSeconds()-t.t.plantedAt)));
      text = `${ITEMS[crop.item].name} (${left}s left)`;
    }
  } else if (t.t.type === 'plowed') {
    text = 'Plowed soil — ready to plant';
  } else if (t.t.type === 'soil') {
    text = 'Soil — plow to till';
  } else if (t.t.type === 'grass') {
    text = 'Grass';
  } else if (t.t.type === 'water') {
    text = 'Water';
  } else if (t.t.type === 'path') {
    text = 'Path';
  }
  if (text) {
    tooltip.style.display = 'block';
    tooltip.textContent = text;
    tooltip.style.left = (mousePos.x + 12) + 'px';
    tooltip.style.top  = (mousePos.y + 12) + 'px';
  } else tooltip.style.display = 'none';
}

const SAVE_KEY = 'sunnyacres-save-v2';
function saveGame() {
  const data = {
    coins: state.coins, xp: state.xp, level: state.level, day: state.day,
    selectedSeed: state.selectedSeed,
    grid: state.grid.map(row => row.map(t => ({
      type: t.type, crop: t.crop, plantedAt: t.plantedAt, building: t.building, tree: t.tree
    }))),
    inv: state.inv,
    buildings: state.buildings,
    penAnimals: state.penAnimals,
    prodQueues: state.prodQueues,
    orders: state.orders,
    stats: state.stats,
    // NEW
    quests: state.quests,
    achievements: state.achievements,
    season: state.season, seasonDay: state.seasonDay,
    weather: state.weather, weatherUntil: state.weatherUntil,
    penFeed: state.penFeed,
    decor: state.decor,
    trees: state.trees,
    musicOn: state.musicOn,
    saveTime: nowSeconds(),
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }
  catch(e) { console.warn('save failed', e); }
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    state.coins = data.coins; state.xp = data.xp; state.level = data.level;
    state.day = data.day; state.selectedSeed = data.selectedSeed || 'wheat';
    state.grid = data.grid.map(row => row.map(t => ({ ...t, watered: false })));
    state.inv = data.inv || {};
    state.buildings = data.buildings || [];
    state.penAnimals = data.penAnimals || {};
    state.prodQueues = data.prodQueues || {};
    state.orders = data.orders || [];
    state.stats = Object.assign({
      harvested:0, sold:0, planted:0, produced:0, plowed:0,
      earned:100, animalsOwned:0, ordersFulfilled:0, questsDone:0,
      fishCaught:0, decorsPlaced:0, treesGrown:0, crowsShooed:0,
      itemsProduced: {},
    }, data.stats || {});
    // NEW state fields with defaults
    state.quests = data.quests || [];
    state.achievements = data.achievements || {};
    state.season = data.season || 'spring';
    state.seasonDay = data.seasonDay || 1;
    state.weather = data.weather || 'sunny';
    state.weatherUntil = data.weatherUntil || 0;
    state.penFeed = data.penFeed || {};
    state.decor = data.decor || [];
    state.trees = data.trees || [];
    state.musicOn = data.musicOn !== undefined ? data.musicOn : true;
    // Adjust timers — plantedAt and produce timers are in performance.now() seconds; reset baseline.
    const offset = data.saveTime || 0;
    const curNow = nowSeconds();
    const delta = curNow - offset;
    for (const row of state.grid) for (const t of row) if (t.plantedAt) t.plantedAt += delta;
    for (const id in state.penAnimals) {
      for (const a of state.penAnimals[id]) {
        a.lastProduced = (a.lastProduced || 0) + delta;
        a.ax = a.ax ?? rand(120); a.ay = a.ay ?? rand(120);
        a.tx = a.tx ?? a.ax; a.ty = a.ty ?? a.ay;
        a.frame = 0; a.frameT = rand(2);
      }
    }
    for (const id in state.prodQueues) {
      for (const job of state.prodQueues[id]) {
        job.startTime += delta;
        job.doneAt += delta;
      }
    }
    // Trees timing
    for (const tr of state.trees) {
      tr.plantedAt += delta;
      if (tr.lastHarvested) tr.lastHarvested += delta;
    }
    state.weatherUntil += delta;
    return true;
  } catch(e) {
    console.warn('load failed', e);
    return false;
  }
}

// =============================================================
//  UPDATE / TICK
// =============================================================
let lastTime = performance.now();
let smokeT = 0;
function update(dt) {
  // Particles
  for (let i=state.particles.length-1; i>=0; i--) {
    const p = state.particles[i];
    p.age += dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
    if (!p.isRain && !p.isSnow && !p.isWind) {
      p.vy += 180*dt; p.vx *= Math.pow(0.5, dt*2);
    }
    if (p.age > p.life) state.particles.splice(i,1);
  }
  // Floats
  for (let i=state.floats.length-1; i>=0; i--) {
    const f = state.floats[i];
    f.age += dt; f.y -= 30*dt;
    if (f.age > f.life) state.floats.splice(i,1);
  }
  // Animals wander
  for (const id in state.penAnimals) {
    const b = state.buildings.find(b => b.id === id);
    if (!b) continue;
    const def = BUILDINGS[b.type];
    for (const a of state.penAnimals[id]) {
      a.frameT += dt;
      if (a.frameT > 0.4) { a.frame = 1 - a.frame; a.frameT = 0; }
      // move toward target
      const dx = a.tx - a.ax, dy = a.ty - a.ay;
      const d = Math.hypot(dx,dy);
      const speed = 18;
      if (d > 2) {
        a.ax += (dx/d) * speed * dt;
        a.ay += (dy/d) * speed * dt;
      } else if (Math.random() < dt*0.5) {
        a.tx = 16 + rand(def.w*TILE - 56);
        a.ty = 16 + rand(def.h*TILE - 56);
      }
    }
  }
  // Smoke/factory animation timer
  smokeT += dt;
  if (smokeT > 0.6) {
    smokeT = 0;
    for (const b of state.buildings) {
      const def = BUILDINGS[b.type];
      if (def.kind === 'production' && state.prodQueues[b.id] && state.prodQueues[b.id].length>0) {
        // emit smoke particle from chimney
        const sx = b.x*TILE + def.w*TILE - 12;
        const sy = b.y*TILE + 14;
        state.particles.push({
          x: sx + rand(4)-2, y: sy,
          vx: rand(20)-10, vy: -25-rand(10),
          life: 1.4+rand(0.6), age: 0,
          color: '#c0c0c0', size: 5
        });
      }
    }
  }

  // Day clock
  const elapsed = nowSeconds() - state.startTime;
  const newDay = 1 + Math.floor(elapsed / DAY_SECONDS);
  state.day = newDay;

  // Weather/season
  updateWeatherAndSeason();

  // Random events
  tryTriggerEvent(dt);
  updateEvent(dt);

  // Crows update (during crow events)
  if (state.crows.length > 0) updateCrows(dt);

  // Pet dog
  updateDog(dt);

  // Animal pen feed depletion
  updatePenFeed(dt);

  // Weather particles
  state._weatherPartT = (state._weatherPartT || 0) + dt;
  if (state._weatherPartT > 0.05) {
    state._weatherPartT = 0;
    if (state.weather === 'rainy' || state.weather === 'storm') {
      // Spawn rain particles spread over the visible area
      for (let i=0; i<3; i++) {
        const wx = state.camX - SW()/state.camScale/2 + rand(SW()/state.camScale);
        const wy = state.camY - SH()/state.camScale/2 + rand(SH()/state.camScale*0.7);
        state.particles.push({
          x: wx, y: wy,
          vx: -10, vy: 280,
          life: 1.0, age: 0,
          color: state.weather === 'storm' ? '#5a8acf' : '#7ac0ef', size: 2,
          isRain: true,
        });
      }
      if (state.weather === 'storm' && Math.random() < dt*0.05) sfx.thunder();
    } else if (state.weather === 'snowy') {
      for (let i=0; i<2; i++) {
        const wx = state.camX - SW()/state.camScale/2 + rand(SW()/state.camScale);
        const wy = state.camY - SH()/state.camScale/2 + rand(SH()/state.camScale*0.7);
        state.particles.push({
          x: wx, y: wy,
          vx: (Math.random()-0.5)*15, vy: 28,
          life: 4.0, age: 0,
          color: '#fff', size: 3,
          isSnow: true,
        });
      }
    } else if (state.weather === 'windy') {
      if (Math.random() < 0.3) {
        const wx = state.camX - SW()/state.camScale/2 + rand(SW()/state.camScale);
        const wy = state.camY - SH()/state.camScale/2 + rand(SH()/state.camScale);
        state.particles.push({
          x: wx, y: wy,
          vx: 80 + rand(40), vy: rand(20)-10,
          life: 1.5, age: 0,
          color: '#c0e0a0', size: 3,
          isWind: true,
        });
      }
    }
  }

  // Periodically generate orders (every ~30s if under cap)
  state._orderTick = (state._orderTick||0) + dt;
  if (state._orderTick > 30) {
    state._orderTick = 0;
    maybeUnlockOrders();
  }

  // Periodic autosave
  state._saveTick = (state._saveTick||0) + dt;
  if (state._saveTick > 20) {
    state._saveTick = 0;
    saveGame();
  }
}

// =============================================================
//  RENDER
// =============================================================
function render() {
  ctx.save();
  ctx.scale(DPR, DPR);

  // Time-of-day phase based on day cycle (0-1)
  const dayElapsed = (nowSeconds() - state.startTime) % DAY_SECONDS / DAY_SECONDS;
  // 0=dawn, 0.25=morning, 0.5=noon, 0.75=evening, 1=night
  const isNight = dayElapsed > 0.85 || dayElapsed < 0.1;
  const isDusk = dayElapsed > 0.7 && dayElapsed <= 0.85;
  const isDawn = dayElapsed >= 0.1 && dayElapsed < 0.2;

  // Sky color by time + weather
  const sky = ctx.createLinearGradient(0,0,0,SH());
  if (state.weather === 'storm') {
    sky.addColorStop(0, '#5a6878'); sky.addColorStop(1, '#7a8088');
  } else if (state.weather === 'rainy') {
    sky.addColorStop(0, '#90a8b8'); sky.addColorStop(1, '#a8b8c0');
  } else if (state.weather === 'snowy') {
    sky.addColorStop(0, '#d8e0e8'); sky.addColorStop(1, '#e8eef0');
  } else if (state.weather === 'cloudy') {
    sky.addColorStop(0, '#b8d0e0'); sky.addColorStop(1, '#d0d8d0');
  } else if (isNight) {
    sky.addColorStop(0, '#1a2548'); sky.addColorStop(1, '#3a4868');
  } else if (isDusk) {
    sky.addColorStop(0, '#e88060'); sky.addColorStop(1, '#f0c890');
  } else if (isDawn) {
    sky.addColorStop(0, '#f0c8a0'); sky.addColorStop(1, '#ffe0c0');
  } else {
    sky.addColorStop(0, '#bce8ff'); sky.addColorStop(1, '#d8f0c0');
  }
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,SW(),SH());

  // Camera transform
  ctx.translate(SW()/2, SH()/2);
  ctx.scale(state.camScale, state.camScale);
  ctx.translate(-state.camX, -state.camY);

  // Tiles
  for (let gy=0; gy<GRID_H; gy++) {
    for (let gx=0; gx<GRID_W; gx++) {
      const t = state.grid[gy][gx];
      let s;
      if (t.type === 'plowed') s = sprites.plowed;
      else if (t.type === 'soil') s = sprites.soil;
      else if (t.type === 'water') s = sprites.water;
      else if (t.type === 'path') s = sprites.path;
      else s = sprites.grass;
      ctx.drawImage(s, gx*TILE, gy*TILE);
      // Snow overlay on grass/soil
      if (state.season === 'winter' && (t.type === 'grass' || t.type === 'soil')) {
        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = '#fff';
        ctx.fillRect(gx*TILE, gy*TILE, TILE, TILE);
        ctx.restore();
      }
      // crop overlay
      if (t.crop) {
        const stage = cropStage(t);
        if (stage >= 0) {
          ctx.save();
          // Wilt → desaturate
          if (isWithered(t)) ctx.globalAlpha = 0.4;
          else if (isWilting(t)) ctx.globalAlpha = 0.7;
          // Bob ready crops gently
          let bobY = 0;
          if (stage === 3 && !isWithered(t)) {
            bobY = Math.sin(performance.now()/300 + gx*0.5 + gy*0.7) * 1.5;
          }
          ctx.drawImage(sprites.crops[t.crop][stage], gx*TILE, gy*TILE + bobY);
          ctx.restore();
          // ready glow
          if (stage === 3 && !isWithered(t) && !isWilting(t)) {
            ctx.save();
            ctx.globalAlpha = 0.4 + 0.2*Math.sin(performance.now()/200);
            ctx.shadowColor = '#ffe070';
            ctx.shadowBlur = 8;
            ctx.drawImage(sprites.crops[t.crop][stage], gx*TILE, gy*TILE);
            ctx.restore();
          }
          // Wilting droop indicator
          if (isWilting(t) && !isWithered(t)) {
            ctx.save();
            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = '#d24a4a';
            ctx.fillText('!', gx*TILE + TILE/2 - 3, gy*TILE - 4);
            ctx.restore();
          }
        }
      }
    }
  }

  // Building/decoration placement preview
  if (state.placing) {
    const w = screenToWorld(mousePos.x, mousePos.y);
    const gx = Math.floor(w.x/TILE), gy = Math.floor(w.y/TILE);
    if (state.placing.decor) {
      const def = DECORATIONS[state.placing.type];
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.drawImage(sprites.decor[state.placing.type], gx*TILE, gy*TILE);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#4ad84a'; ctx.lineWidth = 3;
      ctx.strokeRect(gx*TILE+2, gy*TILE+2, def.w*TILE-4, def.h*TILE-4);
      ctx.restore();
    } else if (state.placing.tree) {
      const tdef = ORCHARDS[state.placing.tree];
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.drawImage(sprites.orchard[state.placing.tree][0], gx*TILE, gy*TILE);
      ctx.globalAlpha = 1;
      const okSoil = state.grid[gy] && state.grid[gy][gx] && (state.grid[gy][gx].type === 'plowed' || state.grid[gy][gx].type === 'soil');
      ctx.strokeStyle = okSoil ? '#4ad84a' : '#e84040'; ctx.lineWidth = 3;
      ctx.strokeRect(gx*TILE+2, gy*TILE+2, TILE-4, TILE-4);
      ctx.restore();
    } else if (state.placing.type) {
      const def = BUILDINGS[state.placing.type];
      const canPlace = canPlaceBuilding(state.placing.type, gx, gy);
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.drawImage(sprites.building[state.placing.type], gx*TILE, gy*TILE);
      ctx.restore();
      ctx.save();
      ctx.strokeStyle = canPlace ? '#4ad84a' : '#e84040';
      ctx.lineWidth = 3;
      ctx.strokeRect(gx*TILE+2, gy*TILE+2, def.w*TILE-4, def.h*TILE-4);
      ctx.restore();
    }
  }

  // Sort buildings + decorations + trees + crows + dog by Y for depth
  const drawables = [];
  for (const b of state.buildings) {
    drawables.push({ y: (b.y+BUILDINGS[b.type].h)*TILE, kind: 'building', data: b });
  }
  for (const d of state.decor) {
    drawables.push({ y: (d.y+DECORATIONS[d.type].h)*TILE, kind: 'decor', data: d });
  }
  for (const tr of state.trees) {
    drawables.push({ y: (tr.y+1)*TILE, kind: 'tree', data: tr });
  }
  for (const c of state.crows) {
    drawables.push({ y: c.y + 16, kind: 'crow', data: c });
  }
  if (state.dog) {
    drawables.push({ y: state.dog.y + 20, kind: 'dog', data: state.dog });
  }

  drawables.sort((a,b) => a.y - b.y);
  for (const d of drawables) {
    if (d.kind === 'building') {
      const b = d.data;
      const def = BUILDINGS[b.type];
      ctx.drawImage(sprites.building[b.type], b.x*TILE, b.y*TILE);
      // Pen: draw animals inside
      if (def.kind === 'pen' && state.penAnimals[b.id]) {
        for (const a of state.penAnimals[b.id]) {
          const fr = a.frame || 0;
          ctx.drawImage(sprites.animal[def.animal][fr],
            b.x*TILE + a.ax - 32, b.y*TILE + a.ay - 32);
        }
        // produce-ready indicators
        const aniDef = ANIMALS[def.animal];
        const hungry = penFeedLevel(b.id) < 20;
        let readyN = 0;
        for (const a of state.penAnimals[b.id]) {
          if (!hungry && nowSeconds() - a.lastProduced >= aniDef.produceTime) readyN++;
        }
        if (readyN > 0) {
          const cx = b.x*TILE + def.w*TILE/2;
          const cy = b.y*TILE - 8 + Math.sin(performance.now()/200)*3;
          ctx.drawImage(sprites.item[aniDef.produces], cx-16, cy-32, 32, 32);
          // count badge
          ctx.fillStyle = '#3a8020';
          ctx.beginPath(); ctx.arc(cx+12, cy-30, 8, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 12px sans-serif';
          ctx.fillText(readyN+'', cx+8, cy-26);
        }
        // Hunger warning
        if (hungry && state.penAnimals[b.id].length > 0) {
          const cx = b.x*TILE + def.w*TILE/2;
          const cy = b.y*TILE - 8;
          ctx.save();
          ctx.globalAlpha = 0.85;
          ctx.font = 'bold 24px sans-serif';
          ctx.fillText('🍽️', cx-12, cy-8);
          ctx.restore();
        }
      }
      // Production: show queue indicators above
      if (def.kind === 'production' && state.prodQueues[b.id]) {
        const q = state.prodQueues[b.id];
        let readyN = 0;
        for (const job of q) if (job.doneAt <= nowSeconds()) readyN++;
        if (readyN > 0) {
          const cx = b.x*TILE + def.w*TILE/2;
          const cy = b.y*TILE - 8 + Math.sin(performance.now()/200)*3;
          ctx.fillStyle = '#6abf4b';
          ctx.beginPath(); ctx.arc(cx, cy-10, 12, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 16px sans-serif';
          ctx.fillText('✓', cx-5, cy-5);
          ctx.fillStyle = '#3a2410';
          ctx.fillRect(cx-10, cy+4, 20, 2);
        }
      }
      // Fishing dock: pulse hint
      if (def.kind === 'fishing') {
        const cx = b.x*TILE + def.w*TILE/2;
        const cy = b.y*TILE - 4 + Math.sin(performance.now()/300)*3;
        ctx.save();
        ctx.globalAlpha = 0.6 + 0.3*Math.sin(performance.now()/300);
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText('🎣', cx-12, cy-10);
        ctx.restore();
      }
    } else if (d.kind === 'decor') {
      const dec = d.data;
      const def = DECORATIONS[dec.type];
      ctx.drawImage(sprites.decor[dec.type], dec.x*TILE, dec.y*TILE);
      // Animated pinwheel rotation overlay (cheap effect: redraw rotated)
      if (dec.type === 'pinwheel') {
        const cx = dec.x*TILE + TILE/2, cy = dec.y*TILE + TILE/2 - 6;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(performance.now()/300);
        ctx.fillStyle = '#ff80c0';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(10,-2); ctx.lineTo(0,-10); ctx.fill();
        ctx.fillStyle = '#80c0ff';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(2,10); ctx.lineTo(10,2); ctx.fill();
        ctx.fillStyle = '#ffe080';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,2); ctx.lineTo(0,10); ctx.fill();
        ctx.fillStyle = '#80e080';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-2,-10); ctx.lineTo(-10,-2); ctx.fill();
        ctx.restore();
      }
    } else if (d.kind === 'tree') {
      const tr = d.data;
      const stage = getTreeStage(tr);
      ctx.drawImage(sprites.orchard[tr.type][stage], tr.x*TILE, tr.y*TILE);
      // Mature with fruit: pulsing harvest indicator
      if (stage === 3) {
        const cx = tr.x*TILE + TILE/2;
        const cy = tr.y*TILE - 6 + Math.sin(performance.now()/200)*3;
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#3a8020';
        ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText('✓', cx-3, cy+4);
        ctx.restore();
      }
    } else if (d.kind === 'crow') {
      const c = d.data;
      ctx.drawImage(sprites.crow[c.frame], c.x-16, c.y-16);
      // pulse outline if not yet scared (to invite clicking)
      if (!c.scared) {
        ctx.save();
        ctx.globalAlpha = 0.3 + 0.3*Math.sin(performance.now()/180);
        ctx.strokeStyle = '#ff8040';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(c.x, c.y, 18, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    } else if (d.kind === 'dog') {
      const g = d.data;
      ctx.drawImage(sprites.dog[g.frame], g.x-24, g.y-20);
    }
  }

  // Particles (drawn above everything except UI)
  for (const p of state.particles) {
    ctx.save();
    ctx.globalAlpha = clamp(1 - p.age/p.life, 0, 1);
    if (p.isRain) {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.vx*0.03, p.y + p.vy*0.03);
      ctx.stroke();
    } else if (p.isSnow) {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    }
    ctx.restore();
  }
  // Floats
  for (const f of state.floats) {
    ctx.save();
    ctx.globalAlpha = clamp(1 - f.age/f.life, 0, 1);
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = '#000';
    ctx.fillText(f.text, f.x - ctx.measureText(f.text).width/2 + 1, f.y+1);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x - ctx.measureText(f.text).width/2, f.y);
    ctx.restore();
  }

  // Grid overlay (only when placing)
  if (state.placing) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (let gx=0; gx<=GRID_W; gx++) {
      ctx.beginPath();
      ctx.moveTo(gx*TILE, 0); ctx.lineTo(gx*TILE, GRID_H*TILE); ctx.stroke();
    }
    for (let gy=0; gy<=GRID_H; gy++) {
      ctx.beginPath();
      ctx.moveTo(0, gy*TILE); ctx.lineTo(GRID_W*TILE, gy*TILE); ctx.stroke();
    }
    ctx.restore();
  }

  // World border
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 6;
  ctx.strokeRect(-3, -3, GRID_W*TILE+6, GRID_H*TILE+6);
  ctx.restore();

  // Decorative trees around the border
  drawDecor();

  ctx.restore();

  // Atmospheric overlay (after camera restore — covers entire screen)
  ctx.save();
  ctx.scale(DPR, DPR);
  if (isNight) {
    ctx.fillStyle = 'rgba(20,30,60,0.45)';
    ctx.fillRect(0,0,SW(),SH());
    // Moon
    ctx.fillStyle = 'rgba(255,250,220,0.85)';
    ctx.beginPath(); ctx.arc(SW()-100, 80, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(20,30,60,0.4)';
    ctx.beginPath(); ctx.arc(SW()-90, 76, 28, 0, Math.PI*2); ctx.fill();
  } else if (isDusk) {
    ctx.fillStyle = 'rgba(240,140,80,0.18)';
    ctx.fillRect(0,0,SW(),SH());
  } else if (isDawn) {
    ctx.fillStyle = 'rgba(255,200,140,0.15)';
    ctx.fillRect(0,0,SW(),SH());
  }
  // Season tint
  const seasonTint = SEASON_INFO[state.season].ambient;
  if (seasonTint && seasonTint !== 'rgba(255,220,180,0.0)' && seasonTint !== 'rgba(255,230,160,0.0)') {
    ctx.fillStyle = seasonTint;
    ctx.fillRect(0,0,SW(),SH());
  }
  // Weather darkening
  if (state.weather === 'storm') {
    ctx.fillStyle = 'rgba(40,50,80,0.25)';
    ctx.fillRect(0,0,SW(),SH());
  } else if (state.weather === 'rainy') {
    ctx.fillStyle = 'rgba(100,120,140,0.12)';
    ctx.fillRect(0,0,SW(),SH());
  }
  ctx.restore();
}

let decorTreeCache = null;
function spriteTree() {
  const c = makeCanvas(80, 100);
  const g = c.getContext('2d');
  // trunk
  g.fillStyle = '#5a3a20';
  g.fillRect(36, 60, 8, 30);
  g.fillStyle = '#7a5430';
  g.fillRect(36, 60, 2, 30);
  // foliage layers
  g.fillStyle = '#2a6020';
  g.beginPath(); g.arc(40, 55, 24, 0, Math.PI*2); g.fill();
  g.fillStyle = '#3a8030';
  g.beginPath(); g.arc(30, 48, 18, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(50, 50, 16, 0, Math.PI*2); g.fill();
  g.fillStyle = '#5cb040';
  g.beginPath(); g.arc(38, 42, 12, 0, Math.PI*2); g.fill();
  g.fillStyle = '#7ec850';
  g.beginPath(); g.arc(34, 38, 6, 0, Math.PI*2); g.fill();
  // ground shadow
  g.fillStyle = 'rgba(0,0,0,0.2)';
  g.beginPath(); g.ellipse(40, 92, 18, 4, 0, 0, Math.PI*2); g.fill();
  return c;
}

const decorPositions = [];
function initDecor() {
  if (decorPositions.length) return;
  // Trees outside grid
  const margin = 120;
  for (let i=0; i<30; i++) {
    let x, y;
    let attempts = 0;
    do {
      x = -margin + rand(GRID_W*TILE + margin*2);
      y = -margin + rand(GRID_H*TILE + margin*2);
      attempts++;
    } while ((x>0 && x<GRID_W*TILE && y>0 && y<GRID_H*TILE) && attempts<10);
    if (x>0 && x<GRID_W*TILE && y>0 && y<GRID_H*TILE) {
      // push outside
      if (Math.abs(x-GRID_W*TILE/2) > Math.abs(y-GRID_H*TILE/2)) {
        x = x < GRID_W*TILE/2 ? -margin/2 - rand(60) : GRID_W*TILE + margin/2 + rand(60);
      } else {
        y = y < GRID_H*TILE/2 ? -margin/2 - rand(60) : GRID_H*TILE + margin/2 + rand(60);
      }
    }
    decorPositions.push({ x, y, t: 'tree' });
  }
  decorTreeCache = spriteTree();
}
function drawDecor() {
  for (const d of decorPositions) {
    ctx.drawImage(decorTreeCache, d.x-40, d.y-90);
  }
}

// =============================================================
//  MAIN LOOP
// =============================================================
function frame(now) {
  const dt = Math.min(0.1, (now - lastTime)/1000);
  lastTime = now;
  update(dt);
  render();
  updateHUD(); // cheap
  requestAnimationFrame(frame);
}

// =============================================================
//  INIT
// =============================================================
function setupInitialFarm() {
  // Carve out a little path through the middle
  for (let gx=0; gx<GRID_W; gx++) {
    state.grid[Math.floor(GRID_H/2)][gx].type = 'path';
  }
  // A water tile (decorative pond) corner
  const ponds = [{x:0,y:0}, {x:0,y:1}, {x:1,y:0}];
  for (const p of ponds) state.grid[p.y][p.x].type = 'water';
}

function init() {
  buildSprites();
  initGrid();
  attachInput();
  attachToolButtons();
  // Try load
  const loaded = loadGame();
  if (!loaded) {
    setupInitialFarm();
    // Place a starter wheat patch (plowed and pre-planted for tutorial vibes)
    for (let x=4; x<=6; x++) {
      state.grid[3][x].type = 'plowed';
    }
    maybeUnlockOrders();
  }
  markBuildingTiles();
  initDecor();
  setTool('hand');
  updateSeedBtnLabel();
  // center camera
  state.camX = (GRID_W*TILE)/2;
  state.camY = (GRID_H*TILE)/2;
  state.camScale = Math.min(SW()/(GRID_W*TILE), SH()/(GRID_H*TILE)) * 0.85;
  state.camScale = clamp(state.camScale, 0.6, 1.6);

  // Initialize quests if empty
  if (state.quests.length === 0) refillQuests();
  renderQuests();

  // Initialize weather/season
  if (!state.weatherUntil) state.weatherUntil = nowSeconds() + DAY_SECONDS;
  updateWeatherAndSeason();

  // Spawn dog if level appropriate
  if (state.level >= 4 && !state.dog) spawnDog();

  // Music toggle UI state
  const mt = document.getElementById('music-toggle');
  if (mt) {
    mt.classList.toggle('muted', !state.musicOn);
    mt.textContent = state.musicOn ? '🎵' : '🔇';
  }

  // Music starts on first user interaction (autoplay restriction)
  const startAudioOnce = () => {
    ensureAudio();
    if (state.musicOn) startMusic();
    document.removeEventListener('pointerdown', startAudioOnce);
    document.removeEventListener('keydown', startAudioOnce);
  };
  document.addEventListener('pointerdown', startAudioOnce);
  document.addEventListener('keydown', startAudioOnce);

  renderOrders();
  updateHUD();
  // Check achievements once after load to catch any newly-met conditions
  checkAchievements();

  if (!loaded) {
    setTimeout(openHelp, 500);
  } else {
    toast('Welcome back!');
  }
  lastTime = performance.now();
  requestAnimationFrame(frame);
  window.addEventListener('beforeunload', saveGame);
}

init();
</script>
